<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTRL+WEAR - Style in command</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header>
      <div class="div-logo">
        <a href="../index.html">
          <img src="../img/logo.png" alt="Logo CTRL+WEAR" width="300"
        /></a>
      </div>

      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../pages/nosotros.html">Nosotros</a></li>
          <li><a href="../pages/productos.html">Productos</a></li>
          <li><a href="../pages/contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="main-title text-secondary">Contacto</h1>
      <form
        class="contact-form"
        action="https://formspree.io/f/xykloevn"
        method="POST"
      >
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required />
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje" required></textarea>
        </div>

        <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
      </form>
    </main>

    <footer>
      <p>© 2026 CTRL+WEAR</p>
      <p>Sitio realizado por Wanda Palladino para Talento Tech</p>
      <nav>
        <ul class="footer-list">
          <li><img src="./img/facebook.png" alt="Logo-Facebook" /></li>
          <li><img src="./img/instagram.png" alt="Logo-Instagram" /></li>
          <li><img src="./img/tiktok.png" alt="Logo-TikTok" /></li>
          <li><img src="./img/whatsapp.png" alt="Logo-WhatsApp" /></li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
